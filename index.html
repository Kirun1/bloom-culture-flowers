<style>
/* ============ PALETTE (swap your brand colors here) ============ */
:root{
  --cream:        #f7f6f0;   /* app canvas — brand off-white */
  --cream-deep:   #eeece1;   /* slightly deeper bands */
  --paper:        #ffffff;   /* cards / surfaces */
  --ink:          #2c352a;   /* primary text — deep green-charcoal */
  --ink-soft:     #5d685a;   /* secondary text */
  --ink-faint:    #98a18f;   /* tertiary / mono labels */
  --line:         #e6e3d6;   /* hairlines */
  --line-strong:  #d6d2c3;

  --sage:         #384d39;   /* PRIMARY accent — brand forest green */
  --sage-deep:    #2b3c2c;
  --sage-tint:    #e7ece3;
  --rose:         #aa2138;   /* SECONDARY accent — brand raspberry */
  --rose-deep:    #8c1a2e;
  --rose-tint:    #f5e2e4;
  --clay:         #aa2138;   /* emergency uses the brand raspberry */
  --clay-tint:    #f5e2e4;
  --gold:         #b3934f;

  --accent:       var(--sage);
  --accent-deep:  var(--sage-deep);
  --accent-tint:  var(--sage-tint);

  --shadow-sm: 0 1px 2px rgba(58,52,44,.04), 0 1px 3px rgba(58,52,44,.05);
  --shadow-md: 0 4px 16px rgba(58,52,44,.06), 0 1px 4px rgba(58,52,44,.05);
  --shadow-lg: 0 18px 50px rgba(58,52,44,.13), 0 4px 14px rgba(58,52,44,.07);

  --serif: "Cabin", system-ui, sans-serif;        /* headings (brand) */
  --sans:  "Montserrat", system-ui, -apple-system, sans-serif;  /* body (brand) */
  --mono:  "Archivo", system-ui, sans-serif;       /* accent labels (brand) */

  --radius:  16px;
  --radius-sm: 10px;
  --radius-lg: 26px;
  --sidebar-w: 286px;
}

/* font scale knob from tweaks */
html{ font-size: 16px; }

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }
body{
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
::selection{ background: var(--accent-tint); color: var(--ink); }

h1,h2,h3,h4{ font-family: var(--serif); font-weight:500; line-height:1.08; margin:0; letter-spacing:-.01em; }
p{ margin:0; }
button{ font-family: inherit; cursor:pointer; border:none; background:none; color:inherit; }
a{ color: inherit; }
input, textarea{ font-family: inherit; }

.mono{ font-family: var(--mono); text-transform: uppercase; letter-spacing:.15em; font-size:11px; font-weight:600; }
.serif-it{ font-family: var(--serif); font-style: italic; }

/* scrollbar */
*::-webkit-scrollbar{ width:11px; height:11px; }
*::-webkit-scrollbar-thumb{ background:var(--line-strong); border-radius:8px; border:3px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover{ background:var(--ink-faint); background-clip: padding-box; }

/* root mount fills viewport */
#root{ height:100vh; overflow:hidden; }

/* ---- generic focus ---- */
:focus-visible{ outline: 2px solid var(--accent-deep); outline-offset:2px; border-radius:4px; }

/* ---- responsive grids ---- */
.palette-grid{ display:grid; gap:10px; grid-template-columns:repeat(3, minmax(0,1fr)); }
.shop-grid{ display:grid; gap:14px; grid-template-columns:repeat(3, minmax(0,1fr)); }
.steps-grid{ display:grid; gap:16px; grid-template-columns:repeat(3, minmax(0,1fr)); }
.step-img{ width:240px; }
.hchart-row{ display:grid; grid-template-columns:1.7fr 1fr 1.5fr 0.8fr; }
.cp-row{ display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr; }
.moodboard-grid{ display:grid; gap:12px; grid-template-columns:repeat(5, minmax(0,1fr)); max-width:760px; }
@media (max-width:880px){
  .palette-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
  .shop-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
  .steps-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
}
@media (max-width:600px){
  .palette-grid{ grid-template-columns:1fr; }
  .shop-grid{ grid-template-columns:1fr; }
  .steps-grid{ grid-template-columns:1fr; }
  .moodboard-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
  .step-row{ flex-direction:column !important; }
  .step-img{ width:100% !important; }
  .step-img image-slot{ aspect-ratio:3/2; min-height:0 !important; }
}

/* ============ MOBILE / RESPONSIVE ============ */
.mobile-bar{ display:none; }
.sidebar-scrim{ display:none; }
@media (max-width:820px){
  /* free the page to grow & scroll naturally on mobile */
  html, body{ height:auto !important; overflow-y:auto !important; -webkit-overflow-scrolling:touch; }
  #root{ height:auto !important; overflow:visible !important; }
  .preview-root{ height:auto !important; overflow:visible !important; }
  /* top bar with hamburger */
  .mobile-bar{
    display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:60; height:58px; padding:0 14px;
    background:rgba(255,253,250,.94); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); flex-shrink:0;
  }
  /* shell becomes a single vertical column */
  .app-shell{ display:block !important; height:auto !important; min-height:100vh; overflow:visible !important; }
  .app-shell > main{ height:auto !important; overflow:visible !important; }
  .content-scroll{ height:auto !important; overflow:visible !important; }
  /* sidebar slides in from the left as a drawer */
  .app-sidebar{
    position:fixed !important; top:0; left:0; bottom:0; z-index:70;
    width:min(86vw,320px) !important; height:100vh !important;
    transform:translateX(-104%); transition:transform .26s cubic-bezier(.4,0,.2,1);
    box-shadow:0 18px 60px rgba(44,53,42,.28);
  }
  .app-shell.menu-open .app-sidebar{ transform:translateX(0); }
  .sidebar-scrim{
    display:block; position:fixed; inset:0; z-index:65;
    background:rgba(44,53,42,.42); opacity:0; pointer-events:none; transition:opacity .26s;
  }
  .app-shell.menu-open .sidebar-scrim{ opacity:1; pointer-events:auto; }
  /* roomier tap padding, tighter page margins */
  .page-pad{ padding-left:20px !important; padding-right:20px !important; }
  .cl-grid{ grid-template-columns:1fr !important; }
  .hero-split{ grid-template-columns:1fr !important; }
  .sticky-actions{ padding-left:18px !important; padding-right:18px !important; }
}
@media (max-width:600px){
  .moodboard-grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
  .page-pad{ padding-left:15px !important; padding-right:15px !important; }
  .gate-grid{ grid-template-columns:1fr !important; }
  .gate-brand{ display:none !important; }
}

/* ============ PRINT ============ */
@media print{
  @page{ margin: 14mm; }
  body{ background:#fff; }
  .no-print{ display:none !important; }
  .print-area{ position:static !important; overflow:visible !important; height:auto !important; }
  .app-shell{ display:block !important; height:auto !important; overflow:visible !important; }
  .content-scroll{ overflow:visible !important; height:auto !important; padding:0 !important; }
  .day-body{ display:block !important; }

  /* print just one element (worksheet) */
  body.print-only .app-shell{ display:block !important; }
  body.print-only #root *{ visibility:hidden !important; }
  body.print-only #root .print-only-target, body.print-only #root .print-only-target *{ visibility:visible !important; }
  body.print-only #root .print-only-target{ position:absolute !important; left:0; top:0; width:100%; box-shadow:none !important; border:none !important; }
  .print-only-qr{ display:inline-block !important; }
  .print-only-line{ display:block !important; }
  .print-only-text{ display:inline !important; visibility:visible !important; }
  .helper-edit{ display:none !important; }
  .helper-print{ display:block !important; }

  /* full booklet print mode */
  body.printing-doc #root{ display:none !important; }
  body.printing-doc #bcf-print-doc{ display:block !important; }
}
.helper-print{ display:none; }

/* ===== print booklet (hidden on screen, shown only when printing) ===== */
#bcf-print-doc{ display:none; }
#bcf-print-doc .pm{ page-break-before: always; break-before: page; padding-top: 8px; }
#bcf-print-doc .pm:first-child{ page-break-before: avoid; break-before: avoid; }
#bcf-print-doc h2, #bcf-print-doc h3, #bcf-print-doc h4{ break-after: avoid; }
#bcf-print-doc li, #bcf-print-doc .pcard{ break-inside: avoid; }
@media print{
  #bcf-print-doc{ -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>

<script>
/* Swallow resource-load errors (e.g. an external thumbnail that 404s) so they never
   surface a scary error overlay to customers. App logic errors still log normally. */
window.addEventListener('error', function(e){
  if (e && e.target && (e.target.tagName === 'IMG' || e.target.tagName === 'LINK' || e.target.tagName === 'SCRIPT')) {
    e.stopImmediatePropagation();
    e.preventDefault();
  }
}, true);

// Configure customer and Supabase overrides from query string
(() => {
  const params = new URLSearchParams(window.location.search);
  const cid = params.get('cid');
  const cemail = params.get('cemail');
  if (cid) {
    window.BC_CUSTOMER = { id: cid, email: cemail || '' };
  }
  const sbUrl = params.get('sb_url');
  const sbKey = params.get('sb_key');
  if (sbUrl && sbKey) {
    window.BC_SUPABASE_URL = sbUrl;
    window.BC_SUPABASE_KEY = sbKey;
  }
})();
</script>
